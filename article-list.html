<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事一覧 | よりそい介護</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --accent: #DD6B20;
      --bg: #FFFAF0;
      --white: #FFFFFF;
      --text: #2D3748;
      --text-light: #718096;
      --border: #E2E8F0;
    }
    body { font-family:'Hiragino Sans','Yu Gothic',sans-serif; background:var(--bg); color:var(--text); line-height:1.8; font-size:16px; }
    nav { background:var(--white); border-bottom:1px solid var(--border); padding:0 40px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .logo { font-size:20px; font-weight:700; color:var(--text); text-decoration:none; }
    .logo span { color:var(--accent); }
    nav a.nav-link { color:var(--text-light); text-decoration:none; font-size:14px; }

    .container { max-width:1100px; margin:0 auto; padding:48px 40px; }
    .page-header { margin-bottom:40px; }
    .page-title { font-size:28px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .page-sub { color:var(--text-light); font-size:15px; }

    /* フィルター */
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:32px; }
    .filter-btn {
      padding:8px 20px; border-radius:20px; border:1px solid var(--border);
      background:var(--white); color:var(--text-light); font-size:13px; cursor:pointer;
      transition:all 0.2s; font-family:inherit;
    }
    .filter-btn:hover, .filter-btn.active {
      background:var(--accent); color:var(--white); border-color:var(--accent);
    }

    /* 記事グリッド */
    .article-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }

    .article-card {
      background:var(--white); border:1px solid var(--border); border-radius:12px;
      padding:24px; text-decoration:none; color:inherit; display:block;
      transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .article-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(45,55,72,0.1); border-color:var(--accent); }

    .cat-tag { display:inline-block; font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; margin-bottom:12px; }
    .cat-start    { background:#DD6B201a; color:#DD6B20; }
    .cat-money    { background:#38A1691a; color:#38A169; }
    .cat-facility { background:#3182CE1a; color:#3182CE; }
    .cat-dementia { background:#9F7AEA1a; color:#9F7AEA; }
    .cat-work     { background:#ED64A61a; color:#ED64A6; }
    .cat-endlife  { background:#E535AB1a; color:#B83280; }
    .cat-elderly  { background:#DD6B201a; color:#C05621; }

    .article-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; line-height:1.6; }
    .article-keyword { font-size:13px; color:var(--text-light); }
    .article-date { font-size:12px; color:#A0AEC0; margin-top:12px; }

    /* 空状態 */
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state h3 { font-size:20px; color:var(--text-light); margin-bottom:8px; }
    .empty-state p { font-size:14px; color:#A0AEC0; }
    .empty-icon { font-size:48px; margin-bottom:16px; }

    footer { text-align:center; padding:48px; color:#A0AEC0; font-size:13px; margin-top:48px; background:var(--white); border-top:1px solid var(--border); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Care<span>Space</span></a>
  <a href="index.html" class="nav-link">← トップ</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">介護の記事一覧</h1>
    <p class="page-sub">介護の悩みをカテゴリ別に解説。専門知識がなくても読めるやさしい解説記事です。</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterArticles('all', this)">すべて</button>
    <button class="filter-btn" onclick="filterArticles('start', this)">介護の始め方</button>
    <button class="filter-btn" onclick="filterArticles('money', this)">費用・保険</button>
    <button class="filter-btn" onclick="filterArticles('facility', this)">施設選び</button>
    <button class="filter-btn" onclick="filterArticles('dementia', this)">認知症</button>
    <button class="filter-btn" onclick="filterArticles('work', this)">仕事との両立</button>
    <button class="filter-btn" onclick="filterArticles('endlife', this)">看取り・終末期</button>
    <button class="filter-btn" onclick="filterArticles('elderly', this)">老老介護</button>
  </div>

  <div class="article-grid" id="articleGrid">
    <div class="empty-state" id="emptyState" style="grid-column:1/-1; display:none;">
      <div class="empty-icon">📝</div>
      <h3>記事を生成中です</h3>
      <p>generate_articles.py を実行すると記事が追加されます</p>
    </div>
  </div>
</div>

<footer>© 2026 よりそい介護. All rights reserved.</footer>

<script>
  let allArticles = [];
  let currentFilter = 'all';

  const catLabels = {
    start:    { label: '介護の始め方',       cls: 'cat-start' },
    money:    { label: '費用・保険',         cls: 'cat-money' },
    facility: { label: '施設選び',           cls: 'cat-facility' },
    dementia: { label: '認知症',             cls: 'cat-dementia' },
    work:     { label: '仕事との両立',       cls: 'cat-work' },
  };

  function formatDate(isoStr) {
    const d = new Date(isoStr);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function renderArticles(articles) {
    const grid = document.getElementById('articleGrid');

    if (articles.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px 20px;"><div style="font-size:48px;margin-bottom:16px;">📝</div><h3 style="color:#718096;">該当する記事がありません</h3></div>';
      return;
    }

    grid.innerHTML = articles.map(a => {
      const cat = catLabels[a.category] || { label: a.cat_label, cls: 'cat-couple' };
      return `
        <a href="${a.file}" class="article-card" data-cat="${a.category}">
          <span class="cat-tag ${cat.cls}">${cat.label}</span>
          <div class="article-title">${a.title}</div>
          <div class="article-keyword">🔍 ${a.keyword}</div>
          <div class="article-date">${formatDate(a.created_at)}</div>
        </a>`;
    }).join('');
  }

  function filterArticles(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all' ? allArticles : allArticles.filter(a => a.category === cat);
    renderArticles(filtered);
  }

  allArticles = [
    { file:"articles/sudden-caregiving.html",    title:"親が突然倒れた…介護が始まったとき最初にすること",               category:"start",    cat_label:"急な介護開始",         keyword:"突然 介護 始まった 最初にすること",             created_at:"2026-04-20T09:00:00" },
    { file:"articles/care-insurance.html",        title:"介護保険の使い方と自己負担額の基本知識",                         category:"money",    cat_label:"介護費用・保険",       keyword:"介護保険 自己負担 要介護認定 申請",             created_at:"2026-04-22T09:00:00" },
    { file:"articles/care-facility-types.html",   title:"特養・有料老人ホーム・グループホームの違いと選び方",             category:"facility", cat_label:"施設選び",             keyword:"特養 有料老人ホーム グループホーム 違い 選び方", created_at:"2026-04-24T09:00:00" },
    { file:"articles/dementia-diagnosis.html",    title:"親が認知症と診断されたら最初にすること",                         category:"dementia", cat_label:"認知症",               keyword:"認知症 診断 最初にすること 手続き",             created_at:"2026-04-26T09:00:00" },
    { file:"articles/care-work-balance.html",     title:"介護と仕事の両立｜介護離職を避けるために",                       category:"work",     cat_label:"仕事との両立",         keyword:"介護離職 仕事 両立 介護休業",                   created_at:"2026-04-28T09:00:00" },
    { file:"articles/home-care-limit.html",       title:"在宅介護の限界サイン｜施設入所を考えるタイミングと準備",         category:"facility", cat_label:"在宅介護・施設入所",   keyword:"在宅介護 限界 施設入所 タイミング",             created_at:"2026-04-29T09:00:00" },
    { file:"articles/long-distance-care.html",    title:"遠距離介護を乗り越える方法｜離れて暮らす親のサポート術",         category:"start",    cat_label:"遠距離介護",           keyword:"遠距離介護 離れて暮らす 見守り サポート",       created_at:"2026-04-29T09:10:00" },
    { file:"articles/care-money-prep.html",       title:"介護にかかるお金の現実｜費用の目安と親の資産管理",               category:"money",    cat_label:"介護費用・保険",       keyword:"介護費用 いくら 資産管理 家族信託",             created_at:"2026-04-29T09:20:00" },
    { file:"articles/caregiver-burnout.html",     title:"介護ストレスと燃え尽き症候群を防ぐ方法｜介護者自身のケア",       category:"start",    cat_label:"介護者のメンタルケア", keyword:"介護 ストレス 燃え尽き バーンアウト セルフケア", created_at:"2026-04-29T09:30:00" },
    { file:"articles/dementia-early-signs.html",  title:"認知症の初期症状チェックリスト｜早期発見と受診のすすめ",         category:"dementia", cat_label:"認知症",               keyword:"認知症 初期症状 チェックリスト 物忘れ 受診",   created_at:"2026-04-29T10:00:00" },
    { file:"articles/persuade-parent-care.html",  title:"病院・施設に行きたがらない親を説得する方法",                     category:"start",    cat_label:"受診・施設説得",       keyword:"親 病院 施設 拒否 説得 認知症",                 created_at:"2026-04-29T10:10:00" },
    { file:"articles/tokuyou-application.html",   title:"特養（特別養護老人ホーム）の申し込みと入所待機の基礎知識",       category:"facility", cat_label:"施設選び",             keyword:"特養 申し込み 待機 入所 費用",                  created_at:"2026-04-29T10:20:00" },
    { file:"articles/care-service-guide.html",    title:"デイサービス・訪問介護を使いこなす｜在宅介護サービス完全ガイド", category:"start",    cat_label:"在宅介護サービス",     keyword:"デイサービス 訪問介護 ヘルパー ショートステイ", created_at:"2026-04-29T10:30:00" },
    { file:"articles/family-care-conflict.html",  title:"きょうだい間の介護の役割分担問題｜揉めないための話し合いのコツ", category:"start",    cat_label:"家族・きょうだい問題", keyword:"きょうだい 介護 役割分担 揉める 話し合い",       created_at:"2026-04-29T10:40:00" },
    { file:"articles/care-leave-system.html",     title:"介護休業・介護休暇の制度をフル活用する方法",                     category:"work",     cat_label:"仕事との両立",         keyword:"介護休業 介護休暇 給付金 両立 申請",            created_at:"2026-04-29T10:50:00" },
    { file:"articles/care-facility-visit.html",  title:"老人ホーム見学チェックリスト30項目｜失敗しない施設選びの見方",     category:"facility", cat_label:"施設選び",             keyword:"老人ホーム 見学 チェックリスト 施設選び ポイント", created_at:"2026-04-29T11:00:00" },
    { file:"articles/elderly-alone.html",        title:"一人暮らしの親が心配｜見守りサービスと緊急時対応の準備",           category:"start",    cat_label:"一人暮らし見守り",     keyword:"一人暮らし 親 見守り 緊急時 安否確認 サービス",  created_at:"2026-04-29T11:10:00" },
    { file:"articles/care-manager-tips.html",    title:"ケアマネジャーとの上手な付き合い方｜相談・活用・担当変更のコツ",   category:"start",    cat_label:"介護の始め方",         keyword:"ケアマネ 付き合い方 相談 担当変更 活用",          created_at:"2026-04-29T11:20:00" },
    { file:"articles/night-caregiving.html",     title:"夜間介護で眠れない…夜中の対応と睡眠を確保する5つの方法",           category:"start",    cat_label:"介護者のメンタルケア", keyword:"夜間介護 眠れない 睡眠不足 夜中 対応",            created_at:"2026-04-30T09:00:00" },
    { file:"articles/home-renovation-care.html", title:"介護リフォームの費用と補助金｜介護保険で20万円まで補助される住宅改修", category:"money",    cat_label:"介護費用・保険",       keyword:"介護リフォーム 補助金 住宅改修 手すり 費用",      created_at:"2026-04-30T09:10:00" },
    { file:"articles/home-or-facility.html",     title:"在宅介護か施設か｜後悔しない決断のための7つの判断基準",               category:"facility", cat_label:"施設・在宅の選択",     keyword:"在宅介護 施設 判断 基準 決め方",                  created_at:"2026-04-30T10:00:00" },
    { file:"articles/end-of-life-care.html",     title:"看取りの選択｜家・病院・施設、どこで最期を迎えるか家族で決めるために", category:"endlife",  cat_label:"看取り・終末期",       keyword:"看取り 終末期 在宅 病院 施設 選択",               created_at:"2026-04-30T10:10:00" },
    { file:"articles/elderly-couple-care.html",  title:"老老介護の現実｜配偶者が要介護になったとき、あなたを守るために",       category:"elderly",  cat_label:"老老介護",             keyword:"老老介護 配偶者 共倒れ 高齢者 介護",              created_at:"2026-04-30T10:20:00" },
  ];
  renderArticles(allArticles);
</script>

</body>
</html>
