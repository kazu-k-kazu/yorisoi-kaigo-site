<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&A一覧 | よりそい介護</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --accent:#DD6B20; --bg:#F0F4FF; --white:#fff; --text:#2D3748; --text-light:#718096; --border:#E2E8F0; }
    body { font-family:'Hiragino Sans','Yu Gothic',sans-serif; background:var(--bg); color:var(--text); }
    nav { background:var(--white); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .logo { font-size:18px; font-weight:700; color:var(--text); text-decoration:none; }
    .logo span { color:var(--accent); }
    .nav-right { display:flex; gap:12px; align-items:center; }
    .nav-link { color:var(--text-light); text-decoration:none; font-size:14px; }
    .post-btn { background:var(--accent); color:var(--white); padding:8px 18px; border-radius:20px; text-decoration:none; font-size:13px; font-weight:600; }

    .container { max-width:780px; margin:0 auto; padding:40px 24px; }
    .page-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; }
    .page-title { font-size:26px; font-weight:700; }
    .page-count { font-size:13px; color:var(--text-light); }

    .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .filter-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--white); color:var(--text-light); font-size:13px; cursor:pointer; transition:all 0.2s; font-family:inherit; }
    .filter-btn.active, .filter-btn:hover { background:var(--accent); color:var(--white); border-color:var(--accent); }

    .qa-list { display:flex; flex-direction:column; gap:12px; }

    .qa-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:20px 24px; cursor:pointer; transition:box-shadow 0.2s, border-color 0.2s; }
    .qa-card:hover { box-shadow:0 4px 16px rgba(124,140,248,0.12); border-color:var(--accent); }
    .qa-card-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .cat-tag { display:inline-block; background:rgba(124,140,248,0.1); color:var(--accent); font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; white-space:nowrap; }
    .qa-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; line-height:1.5; }
    .qa-detail { font-size:13px; color:var(--text-light); line-height:1.6; margin-bottom:10px; }
    .qa-footer { display:flex; gap:16px; font-size:12px; color:var(--text-light); }

    /* 詳細モーダル */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--white); border-radius:16px; max-width:640px; width:100%; max-height:85vh; overflow-y:auto; padding:32px; position:relative; }
    .modal-close { position:absolute; top:16px; right:16px; background:var(--bg); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
    .modal-cat { margin-bottom:12px; }
    .modal-title { font-size:20px; font-weight:700; margin-bottom:16px; line-height:1.5; }
    .modal-section { margin-bottom:20px; }
    .modal-section-label { font-size:12px; font-weight:600; color:var(--accent); margin-bottom:8px; letter-spacing:0.05em; }
    .modal-text { font-size:14px; color:var(--text-light); line-height:1.8; background:var(--bg); border-radius:8px; padding:14px; }
    .answer-box { background:rgba(124,140,248,0.06); border:1px solid rgba(124,140,248,0.2); border-radius:8px; padding:16px; }
    .answer-box p { font-size:14px; line-height:1.8; }
    .modal-actions { display:flex; gap:10px; margin-top:24px; }
    .modal-chat-btn { flex:1; background:var(--accent); color:var(--white); padding:12px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; text-align:center; }

    .empty { text-align:center; padding:64px 20px; color:var(--text-light); }
    .empty-icon { font-size:48px; margin-bottom:12px; }

    @media (max-width:768px) {
      .page-header { flex-direction:column; align-items:flex-start; gap:8px; }
      .modal { padding:20px; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Talk<span>Space</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">トップ</a>
    <a href="qa-submit.html" class="post-btn">＋ 相談を投稿</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">みんなの相談</h1>
    <span class="page-count" id="countLabel"></span>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filter('all',this)">すべて</button>
    <button class="filter-btn" onclick="filter('親の介護',this)">親の介護</button>
    <button class="filter-btn" onclick="filter('施設・老人ホーム',this)">施設・老人ホーム</button>
    <button class="filter-btn" onclick="filter('認知症',this)">認知症</button>
    <button class="filter-btn" onclick="filter('費用・お金',this)">費用・お金</button>
    <button class="filter-btn" onclick="filter('仕事と介護の両立',this)">仕事と介護の両立</button>
  </div>

  <div class="qa-list" id="qaList"></div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-cat"><span class="cat-tag" id="mCat"></span></div>
    <h2 class="modal-title" id="mTitle"></h2>
    <div class="modal-section" id="mDetailSection">
      <div class="modal-section-label">詳しい状況</div>
      <div class="modal-text" id="mDetail"></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">回答</div>
      <div class="answer-box"><p id="mAnswer"></p></div>
    </div>
    <div class="modal-actions">
      <a href="chat.html" class="modal-chat-btn">AIにもっと詳しく相談する</a>
    </div>
  </div>
</div>

<script>
  let allData = [];
  let currentFilter = 'all';

  fetch('qa_data.json')
    .then(r => r.json())
    .then(data => {
      allData = data;
      render(data);
    })
    .catch(() => render([]));

  function render(data) {
    const list = document.getElementById('qaList');
    document.getElementById('countLabel').textContent = `${data.length}件の相談`;

    if (data.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><p>まだ相談がありません。最初の投稿をしてみてください。</p></div>`;
      return;
    }

    list.innerHTML = data.map(q => `
      <div class="qa-card" onclick="openModal(${q.id})">
        <div class="qa-card-header">
          <span class="cat-tag">${q.cat_label}</span>
        </div>
        <div class="qa-title">${q.question}</div>
        ${q.detail ? `<div class="qa-detail">${q.detail.length > 80 ? q.detail.slice(0,80)+'...' : q.detail}</div>` : ''}
        <div class="qa-footer">
          <span>💬 ${q.replies}件の回答</span>
          <span>👁 ${q.views} views</span>
          <span>${q.date}</span>
        </div>
      </div>`).join('');
  }

  function filter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(cat === 'all' ? allData : allData.filter(q => q.cat_label === cat));
  }

  function openModal(id) {
    const q = allData.find(x => x.id === id);
    if (!q) return;
    document.getElementById('mCat').textContent = q.cat_label;
    document.getElementById('mTitle').textContent = q.question;
    document.getElementById('mDetail').textContent = q.detail || '';
    document.getElementById('mDetailSection').style.display = q.detail ? 'block' : 'none';
    document.getElementById('mAnswer').textContent = q.answer;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
  function closeModalDirect() { document.getElementById('modal').classList.remove('open'); }
</script>
</body>
</html>
